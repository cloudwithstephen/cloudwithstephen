<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <!-- Google Analytics (GA4) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-NCRVVM1RCL"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-NCRVVM1RCL");
    </script>

    <!-- Title (VERY IMPORTANT FOR SEO) -->
    <title>CloudWithStephen — AI Solutions & Web Development Agency</title>

    <!-- Meta Description (Google snippet) -->
    <meta
      name="description"
      content="CloudWithStephen helps businesses grow online with AI automation, professional websites, and smart digital solutions. Get more customers, save time, and reduce costs."
    />

    <!-- Author -->
    <meta name="author" content="CloudWithStephen" />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="CloudWithStephen, AI solutions, web development, AI chatbot, business automation, website design, ecommerce, Lagos, Nigeria"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.cloudwithstephen.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta
      property="og:title"
      content="CloudWithStephen — AI Solutions & Web Development Agency"
    />
    <meta
      property="og:description"
      content="Helping businesses grow faster with AI automation and smart websites. Professional web development and AI solutions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.cloudwithstephen.com/" />
    <meta
      property="og:image"
      content="https://www.cloudwithstephen.com/og-image.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="CloudWithStephen — AI Solutions & Web Development Agency"
    />
    <meta
      name="twitter:description"
      content="AI automation & professional websites for business growth. CloudWithStephen helps you grow online."
    />
    <meta
      name="twitter:image"
      content="https://www.cloudwithstephen.com/og-image.png"
    />
    <meta name="twitter:creator" content="@cloudwithstephen" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Performance Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Accessibility -->
    <meta name="color-scheme" content="dark light" />
  </head>

  <body>
    <!-- React Root -->
    <div id="root"></div>

    <!-- App Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
